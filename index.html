<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Shadow Runner (Aile Sürümü)</title>
  <meta name="theme-color" content="#060712" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    :root{
      --bg:#060712;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { margin:0; height:100%; background:var(--bg); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    body{ overscroll-behavior: none; }
    .wrap {
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      padding: calc(8px + var(--safe-top)) 8px calc(8px + var(--safe-bottom)) 8px;
      box-sizing:border-box;
    }
    canvas {
      display:block;
      width:100%;
      height:100%;
      max-width: 960px;
      max-height: 560px;
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px;
      touch-action: manipulation;
      box-shadow: 0 0 24px rgba(0,255,255,.08), 0 0 44px rgba(255,0,255,.06);
      background: #05061a;
    }

    .mobileControls{
      position:fixed;
      left:12px; right:12px;
      bottom: calc(12px + var(--safe-bottom));
      display:flex;
      gap:10px;
      justify-content:center;
      z-index:10;
      pointer-events:auto;
    }
    .btn{
      -webkit-tap-highlight-color: transparent;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:rgba(255,255,255,.92);
      padding:10px 12px;
      border-radius:12px;
      font-weight:800;
      font-size:13px;
      min-width:112px;
      user-select:none;
      touch-action: manipulation;
    }
    .btn:active{ transform: scale(0.98); }
    .btn.primary{ background:rgba(0,255,255,.12); border-color:rgba(0,255,255,.22); }
    .btn.danger{ background:rgba(255,0,80,.12); border-color:rgba(255,0,80,.22); }

    .topHint{
      position:fixed;
      left:12px; right:12px;
      top: calc(10px + var(--safe-top));
      display:flex;
      justify-content:space-between;
      gap:12px;
      z-index:10;
      pointer-events:none;
    }
    .badge { padding:8px 10px; border-radius:10px; background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.10); color:rgba(255,255,255,.80); font-size:12px; }

    @media (min-width: 820px){
      .mobileControls{ display:none; }
      canvas{ max-width: 1000px; max-height: 580px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c"></canvas>
  </div>

  <div class="topHint">
    <div class="badge">PC: <b>Space</b> • Mobil: <b>Dokun</b> → Zıpla</div>
    <div class="badge">R: Yeniden Başlat • B: Rekoru Sıfırla</div>
  </div>

  <div class="mobileControls" aria-label="Mobil Kontroller">
    <button id="btnJump" class="btn primary">Zıpla</button>
    <button id="btnRestart" class="btn">Yeniden Başlat</button>
    <button id="btnResetBest" class="btn danger">Rekoru Sıfırla</button>
  </div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  // Base logical resolution
  const BASE_W = 900;
  const BASE_H = 520;
  const W = BASE_W, H = BASE_H;
  const groundY = 410;

  const view = { cssW: 900, cssH: 520, dpr: 1, scale: 1, ox: 0, oy: 0, safeTop: 0 };

  function computeSafeTopPx(){
    const v = getComputedStyle(document.documentElement).getPropertyValue('--safe-top').trim();
    const n = parseFloat(v.replace('px','')) || 0;
    return n;
  }

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    view.cssW = Math.max(1, rect.width);
    view.cssH = Math.max(1, rect.height);
    view.dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    canvas.width  = Math.floor(view.cssW * view.dpr);
    canvas.height = Math.floor(view.cssH * view.dpr);

    const sx = canvas.width  / BASE_W;
    const sy = canvas.height / BASE_H;
    view.scale = Math.min(sx, sy);
    view.ox = (canvas.width  - BASE_W * view.scale) * 0.5;
    view.oy = (canvas.height - BASE_H * view.scale) * 0.5;

    view.safeTop = computeSafeTopPx() * view.dpr;
  }

  window.addEventListener('resize', () => { resizeCanvas(); }, { passive:true });
  window.addEventListener('orientationchange', () => { setTimeout(resizeCanvas, 250); }, { passive:true });

  // ===== Difficulty per Tur =====
  const T1 = { gravity: 2400, jumpV: -1120, speedStart: 330, speedRamp: 9,  spawnMin: 0.95, spawnVar: 0.85, spawnFactor: 1.18 };
  const T2 = { gravity: 2500, jumpV: -1080, speedStart: 385, speedRamp: 12, spawnMin: 0.80, spawnVar: 0.65, spawnFactor: 1.02 };
  const T3 = { gravity: 2550, jumpV: -1060, speedStart: 420, speedRamp: 14, spawnMin: 0.74, spawnVar: 0.60, spawnFactor: 0.95 };

  // ===== State =====
  let last = performance.now();
  let running = true;
  let started = false;

  const player = { x: 160, y: groundY - 84, w: 42, h: 84, vy: 0, onGround: true };

  let speed = T1.speedStart;
  let obstacles = [];
  let score = 0;

  // Collectibles
  let stars = [];
  let starCount = 0;

  // Powerups
  let powerups = []; // {x,y,r,spin,type}
  let shield = false;        // active shield
  let invuln = 0;            // after shield-break small grace
  let shieldCooldown = 0;    // seconds until another shield can spawn
  let shieldBreakFlash = 0;

  // Shield shards (cute glass pieces)
  let shards = []; // {x,y,vx,vy,rot,vr,life,sz,alpha}

  // Each tur: max 1 shield spawn
  let shieldSpawnedThisTur = false;

  // Rekor
  let best = Number(localStorage.getItem('sr_best') || 0);

  // Turlar
  let tur = 1;

  // Tur2 life/checkpoint
  let tur2LifeAvailable = false; // one extra life granted at Tur2 entry
  let lastCheckpointScore = 0;   // for restart-from-checkpoint

  // banners / flashes
  let turBanner = 0;
  let wordFlash = 0;
  let lastWordTrigger = 0;
  let arrowFlash = 0;
  let lastArrowTrigger = 0;

  // Messages
  const demirMilestones = [
    {p: 300,  t: "Demir süper zıpladın! ⭐"},
    {p: 700,  t: "Demir roket gibi gidiyor! 🚀"},
    {p: 1200, t: "Şampiyon Demir! 🏆"}
  ];
  let toast = "";
  let toastTimer = 0;
  const demirSeen = new Set();

  // Spawn control
  let spawnTimer = 0;
  let nextSpawn = T1.spawnMin + Math.random() * T1.spawnVar;

  // Special sequences
  let loveSequence = 0;
  let afterLoveToTur3 = false;

  let clearedInTur3 = 0;
  let tur3Message = 0;

  let familyScene = 0;
  let finalNote = 0;

  // ===== Parallax background =====
  const bg = { far:[], mid:[], near:[], haze:[], shooting:[] };

  function initParallax(){
    bg.far = []; bg.mid = []; bg.near = []; bg.haze = []; bg.shooting = [];
    for (let i=0;i<120;i++){
      bg.far.push({ x: Math.random()*W, y: Math.random()*260, r: 0.8+Math.random()*1.2, sp: 14+Math.random()*20, a: 0.30+Math.random()*0.45 });
    }
    for (let i=0;i<80;i++){
      bg.mid.push({ x: Math.random()*W, y: 10+Math.random()*300, r: 1.2+Math.random()*1.8, sp: 28+Math.random()*36, a: 0.22+Math.random()*0.34 });
    }
    for (let i=0;i<48;i++){
      bg.near.push({ x: Math.random()*W, y: 30+Math.random()*300, r: 1.8+Math.random()*2.8, sp: 52+Math.random()*60, a: 0.16+Math.random()*0.24 });
    }
    for (let i=0;i<6;i++){
      bg.haze.push({ x: Math.random()*W, y: 60+Math.random()*220, r: 140+Math.random()*150, dx: (Math.random()*2-1)*18, dy: (Math.random()*2-1)*8 });
    }
  }

  function spawnShootingStar(){
    const y = 25 + Math.random()*160;
    bg.shooting.push({ x: W+40, y, vx: 520+Math.random()*240, vy: 120+Math.random()*90, life: 0.55+Math.random()*0.25 });
  }

  // ===== Ads (Tur1: each once) =====
  const adDuration = 5.2; // +1s already applied
  const ads = [
    { text:"ishayativedenetim.com", trig: 120, timer: 0, shown:false, align:"left",  x: 18, y: 22 },
    { text:"ozdemirogludanismanlik.com", trig: 260, timer: 0, shown:false, align:"right", x: W-18, y: 22 }
  ];

  // ===== Helpers =====
  function cfgForTur(t){
    return t === 1 ? T1 : (t === 2 ? T2 : T3);
  }

  function setTur(newTur) {
    tur = newTur;
    turBanner = 1;
    spawnTimer = 0;
    obstacles = [];
    stars = [];
    powerups = [];
    invuln = 0;
    shield = false;
    shieldSpawnedThisTur = false;

    if (tur === 1) {
      speed = T1.speedStart;
      nextSpawn = T1.spawnMin + Math.random() * T1.spawnVar;
      lastCheckpointScore = 0;
    } else if (tur === 2) {
      speed = Math.max(speed, T2.speedStart);
      nextSpawn = T2.spawnMin + Math.random() * T2.spawnVar;
      lastWordTrigger = Math.floor(score / 100) * 100;
      lastArrowTrigger = Math.floor(score / 250) * 250;

      tur2LifeAvailable = true;
      lastCheckpointScore = 500;
      toast = "Tur 2: +1 Can ❤️";
      toastTimer = 2.2;
    } else {
      speed = Math.max(speed, T3.speedStart);
      nextSpawn = T3.spawnMin + Math.random() * T3.spawnVar;
      clearedInTur3 = 0;
      tur3Message = 0;
      lastCheckpointScore = 1000;
    }
  }

  function restartFromCheckpoint() {
    running = true;
    started = true;

    player.y = groundY - player.h;
    player.vy = 0;
    player.onGround = true;

    obstacles = [];
    stars = [];
    powerups = [];
    invuln = 0;
    shield = false;
    shieldSpawnedThisTur = false;

    score = lastCheckpointScore;
    tur = 2;
    speed = T2.speedStart;
    spawnTimer = 0;
    nextSpawn = T2.spawnMin + Math.random() * T2.spawnVar;

    turBanner = 1;
    wordFlash = 0;
    arrowFlash = 0;
    lastWordTrigger = Math.floor(score / 100) * 100;
    lastArrowTrigger = Math.floor(score / 250) * 250;

    toast = "Can kullanıldı • Tur 2'den devam";
    toastTimer = 2.2;
  }

  function reset() {
    running = true;
    started = false;
    score = 0;

    player.y = groundY - player.h;
    player.vy = 0;
    player.onGround = true;

    obstacles = [];
    stars = [];
    starCount = 0;

    powerups = [];
    shield = false;
    invuln = 0;
    shieldCooldown = 0;
    shieldBreakFlash = 0;
    shards = [];
    shieldSpawnedThisTur = false;

    spawnTimer = 0;

    tur = 1;
    speed = T1.speedStart;
    nextSpawn = T1.spawnMin + Math.random() * T1.spawnVar;

    tur2LifeAvailable = false;
    lastCheckpointScore = 0;

    turBanner = 0;
    wordFlash = 0;
    lastWordTrigger = 0;
    arrowFlash = 0;
    lastArrowTrigger = 0;

    toast = "";
    toastTimer = 0;
    demirSeen.clear();

    loveSequence = 0;
    afterLoveToTur3 = false;

    clearedInTur3 = 0;
    tur3Message = 0;

    familyScene = 0;
    finalNote = 0;

    for (const a of ads){ a.timer = 0; a.shown = false; }

    initParallax();
    last = performance.now();
  }

  function updateBestIfNeeded() {
    const s = Math.floor(score);
    if (s > best) {
      best = s;
      localStorage.setItem('sr_best', String(best));
    }
  }

  function clearBest() {
    best = 0;
    localStorage.setItem('sr_best', '0');
  }

  function jump() {
    if (!running) return;
    if (!started) started = true;

    const cfg = cfgForTur(tur);

    if (player.onGround) {
      player.vy = cfg.jumpV;
      player.onGround = false;
    }
  }

  function aabb(a,b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function circleRectCollide(circle, rect) {
    const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
    const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
    const dx = circle.x - closestX;
    const dy = circle.y - closestY;
    return (dx*dx + dy*dy) <= circle.r*circle.r;
  }

  function drawText(text, x, y, size=18, alpha=1, weight=700, color="rgba(255,255,255,.92)", align="left") {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.font = `${weight} ${size}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  function neonText(text, x, y, align="left", alpha=1, accent="rgba(0,255,255,1)", size=12) {
    ctx.save();
    ctx.textAlign = align;
    ctx.font = `900 ${size}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
    ctx.globalAlpha = 0.24 * alpha;
    ctx.strokeStyle = accent;
    ctx.lineWidth = 10;
    ctx.strokeText(text, x, y);
    ctx.globalAlpha = 0.90 * alpha;
    ctx.fillStyle = "rgba(255,255,255,.94)";
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  // ===== Background =====
  function drawBaseGradient() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    if (tur === 1) {
      g.addColorStop(0, "#05061a"); g.addColorStop(0.55, "#070a1f"); g.addColorStop(1, "#040414");
    } else if (tur === 2) {
      g.addColorStop(0, "#12061e"); g.addColorStop(0.55, "#140b2a"); g.addColorStop(1, "#070413");
    } else {
      g.addColorStop(0, "#071b1b"); g.addColorStop(0.55, "#07132a"); g.addColorStop(1, "#040414");
    }
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    if (shieldBreakFlash > 0) {
      ctx.save();
      ctx.globalAlpha = Math.min(0.22, shieldBreakFlash * 0.28);
      ctx.fillStyle = "rgba(0,255,255,1)";
      ctx.fillRect(0,0,W,H);
      ctx.restore();
    }
  }

  function drawParallax(now, dt) {
    const t = now * 0.0002;
    for (const h of bg.haze) {
      h.x += Math.sin(t*1.3) * dt * h.dx;
      h.y += Math.cos(t*1.1) * dt * h.dy;
      if (h.x < -220) h.x = W+220;
      if (h.x > W+220) h.x = -220;
      const rg = ctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, h.r);
      const c1 = (tur===1) ? "rgba(0,255,255,.09)" : (tur===2 ? "rgba(255,80,140,.10)" : "rgba(0,255,200,.09)");
      const c2 = (tur===1) ? "rgba(255,0,255,.07)" : (tur===2 ? "rgba(180,0,255,.08)" : "rgba(120,180,255,.07)");
      rg.addColorStop(0, c1);
      rg.addColorStop(0.55, c2);
      rg.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = rg;
      ctx.fillRect(0,0,W,H);
    }

    function layerDraw(arr, accent, mult) {
      for (const s of arr) {
        s.x -= (s.sp + speed*0.02*mult) * dt;
        if (s.x < -10) { s.x = W + 10; s.y = Math.random()*300; }
        ctx.save();
        ctx.globalAlpha = s.a;
        ctx.fillStyle = "rgba(255,255,255,.92)";
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = s.a*0.16;
        ctx.strokeStyle = accent;
        ctx.lineWidth = 6;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r+1.2, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }
    }

    const acc = (tur===2) ? "rgba(255,80,140,1)" : (tur===3 ? "rgba(0,255,200,1)" : "rgba(0,255,255,1)");
    layerDraw(bg.far, acc, 0.6);
    layerDraw(bg.mid, acc, 1.0);
    layerDraw(bg.near, acc, 1.4);

    if (Math.random() < (started && running ? 0.015 : 0.006)) spawnShootingStar();
    bg.shooting = bg.shooting.filter(ss => ss.life > 0);

    for (const ss of bg.shooting) {
      ss.life -= dt;
      ss.x -= ss.vx * dt;
      ss.y += ss.vy * dt;
      const a = Math.max(0, Math.min(1, ss.life / 0.6));
      ctx.save();
      ctx.globalAlpha = 0.88 * a;
      ctx.strokeStyle = "rgba(255,255,255,.9)";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(ss.x, ss.y);
      ctx.lineTo(ss.x + 60, ss.y - 12);
      ctx.stroke();

      ctx.globalAlpha = 0.20 * a;
      ctx.strokeStyle = acc;
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(ss.x, ss.y);
      ctx.lineTo(ss.x + 70, ss.y - 14);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ===== Stars =====
  function spawnStar() {
    const y = 240 + Math.random() * 130;
    stars.push({ x: W + 30, y, r: 10 + Math.random()*4, spin: Math.random()*Math.PI*2, got:false });
  }

  function drawStar(x, y, r, rot, alpha=1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.globalAlpha = alpha;

    const spikes = 5;
    const outer = r;
    const inner = r * 0.48;

    ctx.beginPath();
    for (let i=0; i<spikes*2; i++){
      const ang = (i * Math.PI) / spikes;
      const rr = (i % 2 === 0) ? outer : inner;
      ctx.lineTo(Math.cos(ang) * rr, Math.sin(ang) * rr);
    }
    ctx.closePath();

    ctx.fillStyle = "rgba(255,255,255,.88)";
    ctx.fill();

    ctx.globalAlpha *= 0.22;
    ctx.strokeStyle = (tur === 2) ? "rgba(255,80,140,1)" : (tur === 3 ? "rgba(0,255,200,1)" : "rgba(0,255,255,1)");
    ctx.lineWidth = 10;
    ctx.stroke();
    ctx.restore();
  }

  function starCollide(s) {
    const cx = s.x, cy = s.y, rr = s.r + 6;
    const closestX = Math.max(player.x, Math.min(cx, player.x + player.w));
    const closestY = Math.max(player.y, Math.min(cy, player.y + player.h));
    const dx = cx - closestX;
    const dy = cy - closestY;
    return dx*dx + dy*dy <= rr*rr;
  }

  function drawStars() {
    for (const s of stars) {
      if (!s.got) drawStar(s.x, s.y, s.r, s.spin, 1);
    }
  }

  // ===== Shield powerup =====
  function spawnShieldPowerup() {
    // Each tur: only one shield total (spawned or not)
    if (shieldSpawnedThisTur) return;
    if (shield || shieldCooldown > 0) return;
    const y = 240 + Math.random() * 140;
    powerups.push({ type:'shield', x: W + 40, y, r: 16, spin: Math.random()*Math.PI*2, got:false });
    shieldSpawnedThisTur = true;
    shieldCooldown = 12 + Math.random()*10; // 12-22s
  }

  function drawShieldIcon(p) {
    const x=p.x, y=p.y, r=p.r;
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(p.spin);
    ctx.globalAlpha = 0.95;

    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = "rgba(0,255,255,1)";
    ctx.lineWidth = 10;
    ctx.beginPath(); ctx.arc(0,0,r+3,0,Math.PI*2); ctx.stroke();

    ctx.globalAlpha = 0.35;
    ctx.fillStyle = "rgba(255,255,255,.8)";
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();

    ctx.globalAlpha = 0.85;
    ctx.strokeStyle = "rgba(255,255,255,.92)";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(0,-9);
    ctx.quadraticCurveTo(10,-4, 8, 8);
    ctx.quadraticCurveTo(0, 14, -8, 8);
    ctx.quadraticCurveTo(-10,-4, 0,-9);
    ctx.closePath();
    ctx.stroke();

    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "rgba(255,255,255,.9)";
    ctx.beginPath(); ctx.arc(-5,-6,4,0,Math.PI*2); ctx.fill();

    ctx.restore();
  }

  function powerupCollide(p) {
    const cx = p.x, cy = p.y, rr = p.r + 6;
    const closestX = Math.max(player.x, Math.min(cx, player.x + player.w));
    const closestY = Math.max(player.y, Math.min(cy, player.y + player.h));
    const dx = cx - closestX;
    const dy = cy - closestY;
    return dx*dx + dy*dy <= rr*rr;
  }

  function drawPowerups() {
    for (const p of powerups) {
      if (p.got) continue;
      if (p.type === 'shield') drawShieldIcon(p);
    }
  }

  // ===== Shards (shield break particles) =====
  function spawnShieldShards(px, py) {
    // center around player torso area
    const cx = px + player.w/2;
    const cy = py + 34;

    const n = 14 + Math.floor(Math.random()*8); // 14-21 pieces
    for (let i=0;i<n;i++){
      const ang = Math.random() * Math.PI*2;
      const sp = 220 + Math.random()*420;
      const vx = Math.cos(ang)*sp + 80; // slightly forward
      const vy = Math.sin(ang)*sp - 120; // pop upwards
      shards.push({
        x: cx + (Math.random()*8-4),
        y: cy + (Math.random()*8-4),
        vx, vy,
        rot: Math.random()*Math.PI*2,
        vr: (Math.random()*2-1)*10,
        life: 0.65 + Math.random()*0.45,
        sz: 4 + Math.random()*6,
        alpha: 0.85
      });
    }
  }

  function updateShards(dt) {
    if (shards.length === 0) return;
    for (const s of shards) {
      s.life -= dt;
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 900 * dt;        // gravity
      s.vx *= (1 - 0.7*dt);    // drag
      s.vy *= (1 - 0.25*dt);   // slight drag
      s.rot += s.vr * dt;
      s.alpha = Math.max(0, Math.min(1, s.life / 0.9));
    }
    shards = shards.filter(s => s.life > 0);
  }

  function drawShards() {
    if (shards.length === 0) return;
    ctx.save();
    for (const s of shards) {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);

      // cute glass piece: little rounded triangle
      ctx.globalAlpha = 0.95 * s.alpha;
      ctx.fillStyle = "rgba(255,255,255,.75)";
      ctx.beginPath();
      ctx.moveTo(-s.sz*0.2, -s.sz*0.7);
      ctx.quadraticCurveTo(s.sz*0.6, -s.sz*0.2, s.sz*0.3, s.sz*0.7);
      ctx.quadraticCurveTo(0, s.sz*0.55, -s.sz*0.6, s.sz*0.2);
      ctx.closePath();
      ctx.fill();

      ctx.globalAlpha = 0.18 * s.alpha;
      ctx.strokeStyle = "rgba(0,255,255,1)";
      ctx.lineWidth = 6;
      ctx.stroke();

      ctx.restore();
    }
    ctx.restore();
  }

  // ===== Characters =====
  function drawStickmanBase(px, py, opts) {
    const cx = px + player.w/2;
    const headR = 14;
    const headX = cx;
    const headY = py + 18;

    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    ctx.strokeStyle = "rgba(255,255,255,.92)";
    ctx.lineWidth = 5;

    ctx.beginPath();
    ctx.arc(headX, headY, headR, 0, Math.PI*2);
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,.9)";
    ctx.beginPath(); ctx.arc(headX - 5, headY - 3, 1.6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(headX + 5, headY - 3, 1.6, 0, Math.PI*2); ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,.85)";
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    if (opts.mouth === "soft") ctx.arc(headX, headY + 4, 5.5, 0.25*Math.PI, 0.75*Math.PI);
    else ctx.arc(headX, headY + 3, 6, 0.15*Math.PI, 0.85*Math.PI);
    ctx.stroke();

    if (opts.facialHair) opts.facialHair({headX, headY});

    ctx.strokeStyle = "rgba(255,255,255,.92)";
    ctx.lineWidth = 5;
    const bodyTopY = headY + headR;
    const bodyBotY = py + 54;
    ctx.beginPath();
    ctx.moveTo(cx, bodyTopY);
    ctx.lineTo(cx, bodyBotY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx - 20, py + 38);
    ctx.lineTo(cx + 20, py + 38);
    ctx.stroke();

    const runPhase = started && running ? (performance.now()*0.01) : 0;
    const swing = Math.sin(runPhase) * 8;
    ctx.beginPath();
    ctx.moveTo(cx, bodyBotY);
    ctx.lineTo(cx - 16, py + 80 - swing);
    ctx.moveTo(cx, bodyBotY);
    ctx.lineTo(cx + 16, py + 80 + swing);
    ctx.stroke();

    if (shield) {
      ctx.save();
      ctx.globalAlpha = 0.20;
      ctx.strokeStyle = "rgba(0,255,255,1)";
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.arc(cx, headY+16, 34, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  function drawTur1(px, py) { drawStickmanBase(px, py, { mouth:"smile" }); }
  function drawTur2(px, py) { drawStickmanBase(px, py, { mouth:"soft" }); }
  function drawTur3(px, py) {
    const facialHair = ({headX, headY}) => {
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,.88)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(headX - 6, headY + 4);
      ctx.quadraticCurveTo(headX, headY + 1, headX + 6, headY + 4);
      ctx.stroke();

      ctx.globalAlpha = 0.85;
      ctx.strokeStyle = "rgba(255,255,255,.78)";
      ctx.lineWidth = 2.8;
      ctx.beginPath();
      ctx.arc(headX, headY + 8, 7, 0.15*Math.PI, 0.85*Math.PI);
      ctx.stroke();
      ctx.restore();
    };
    drawStickmanBase(px, py, { mouth:"smile", facialHair });
  }

  function drawCharacter() {
    if (tur === 1) drawTur1(player.x, player.y);
    else if (tur === 2) drawTur2(player.x, player.y);
    else drawTur3(player.x, player.y);
  }

  // ===== Obstacles =====
  function spawnRectObstacle() {
    const type = Math.random() < 0.72 ? 'box' : 'bar';
    let w, h;
    if (type === 'box') { w = 40 + Math.random()*18; h = 52 + Math.random()*34; }
    else { w = 80 + Math.random()*50; h = 24 + Math.random()*18; }
    obstacles.push({ kind:'rect', x: W + 30, y: groundY - h, w, h, passed:false });
  }

  function spawnBallObstacle() {
    const r = 18 + Math.random()*14;
    const baseY = groundY - r;
    const amp = 10 + Math.random()*14;
    const freq = 5.2 + Math.random()*2.0;
    obstacles.push({
      kind:'circle',
      x: W + 30,
      y: baseY,
      baseY,
      r,
      hopT: Math.random() * Math.PI * 2,
      hopAmp: amp,
      hopFreq: freq,
      passed:false
    });
  }

  function spawnObstacle() { (tur === 1) ? spawnRectObstacle() : spawnBallObstacle(); }

  function drawObstacles() {
    for (const o of obstacles) {
      if (o.kind === 'rect') {
        ctx.fillStyle = "rgba(255,255,255,.18)";
        ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = "rgba(255,255,255,.25)";
        ctx.strokeRect(o.x, o.y, o.w, o.h);
      } else {
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,.16)";
        ctx.strokeStyle = "rgba(255,255,255,.28)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.r, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  function checkCollisionsConsume() {
    if (invuln > 0) return false;

    for (let i=0; i<obstacles.length; i++) {
      const o = obstacles[i];
      let hit = false;
      if (o.kind === 'rect') hit = aabb(player, o);
      else hit = circleRectCollide(o, player);

      if (hit) {
        if (shield) {
          shield = false;
          invuln = 0.75;
          shieldBreakFlash = 1.0;
          spawnShieldShards(player.x, player.y);
          obstacles.splice(i, 1);
          toast = "Kalkan kırıldı!";
          toastTimer = 1.6;
          return false;
        }

        if (tur === 2 && tur2LifeAvailable) {
          tur2LifeAvailable = false;
          restartFromCheckpoint();
          return false;
        }

        return true;
      }
    }
    return false;
  }

  function drawWordFlash() {
    if (wordFlash <= 0) return;
    if (tur !== 1 && tur !== 2) return;
    const word = (tur === 2) ? "Bahar" : "Demir";

    ctx.save();
    ctx.globalAlpha = wordFlash * 0.20;
    ctx.fillStyle = "rgba(255,255,255,1)";
    ctx.font = `900 120px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
    ctx.fillText(word, W*0.18, H*0.62);
    ctx.restore();
  }

  function drawArrowFlash() {
    if (arrowFlash <= 0) return;
    const x = W * 0.78, y = H * 0.22, s = 34;

    ctx.save();
    ctx.globalAlpha = arrowFlash * 0.9;
    ctx.strokeStyle = "rgba(255,255,255,.85)";
    ctx.lineWidth = 6;
    ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(x - s, y); ctx.lineTo(x + s, y); ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x + s, y); ctx.lineTo(x + s - 16, y - 12);
    ctx.moveTo(x + s, y); ctx.lineTo(x + s - 16, y + 12);
    ctx.stroke();
    ctx.restore();
  }

  function drawToast() {
    if (toastTimer <= 0) return;
    const a = Math.min(1, toastTimer / 1.5);

    ctx.save();
    ctx.globalAlpha = 0.70 * a;
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fillRect(W/2 - 320, 96, 640, 56);
    ctx.restore();

    drawText(toast, W/2, 132, 20, 0.95*a, 900, "rgba(255,255,255,.92)", "center");
  }

  function drawAds(now, dt) {
    if (tur !== 1 || !started) return;

    const s = Math.floor(score);
    for (const a of ads) {
      if (!a.shown && s >= a.trig) { a.shown = true; a.timer = adDuration; }
      if (a.timer > 0) {
        a.timer = Math.max(0, a.timer - dt);
        const phase = (a.timer > adDuration - 0.6) ? (adDuration - a.timer)/0.6 : (a.timer < 0.9 ? a.timer/0.9 : 1);
        const pulse = 0.65 + 0.35*Math.sin(now*0.006 + a.trig);
        const alpha = 0.85 * phase * pulse;
        neonText(a.text, a.x, a.y, a.align, alpha, "rgba(0,255,255,1)", 14);
      }
    }
  }

  function drawHeart(cx, cy, size) {
    ctx.save();
    ctx.fillStyle = "rgba(255,0,0,0.92)";
    ctx.beginPath();
    const topCurveHeight = size * 0.3;
    ctx.moveTo(cx, cy + topCurveHeight);
    ctx.bezierCurveTo(cx, cy, cx - size/2, cy, cx - size/2, cy + topCurveHeight);
    ctx.bezierCurveTo(cx - size/2, cy + (size+topCurveHeight)/2, cx, cy + (size+topCurveHeight)/2, cx, cy + size);
    ctx.bezierCurveTo(cx, cy + (size+topCurveHeight)/2, cx + size/2, cy + (size+topCurveHeight)/2, cx + size/2, cy + topCurveHeight);
    ctx.bezierCurveTo(cx + size/2, cy, cx, cy, cx, cy + topCurveHeight);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawLoveOverlay() {
    if (loveSequence <= 0) return;
    const a = Math.min(1, loveSequence / 2.0);

    ctx.save();
    ctx.globalAlpha = 0.65 * a;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0,0,W,H);
    ctx.restore();

    drawText("Sizi seviyorum", W/2, H/2 - 20, 36, 0.96 * a, 900, "rgba(255,255,255,.92)", "center");

    const baseY = H/2 + 45;
    drawHeart(W/2 - 70, baseY, 34);
    drawHeart(W/2,      baseY, 40);
    drawHeart(W/2 + 70, baseY, 34);

    drawText("3. Tura geçiliyor...", W/2, H/2 + 96, 14, 0.85 * a, 700, "rgba(255,255,255,.85)", "center");
  }

  function drawTur3Message() {
    if (tur3Message <= 0) return;
    const a = Math.min(1, tur3Message);
    ctx.save();
    ctx.globalAlpha = 0.65 * a;
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fillRect(W/2 - 320, H/2 - 70, 640, 120);
    ctx.restore();

    drawText("Üçüncü Bölüm", W/2, H/2 - 18, 28, 0.95*a, 900, "rgba(255,255,255,.92)", "center");
    drawText("Daha Büyük Aşk ile Tasarlanıyor", W/2, H/2 + 18, 20, 0.92*a, 800, "rgba(255,255,255,.90)", "center");
  }

  function drawFamilyFinale() {
    if (familyScene <= 0) return;

    const a = Math.min(1, familyScene / 1.0);
    ctx.save();
    ctx.globalAlpha = 0.72 * a;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0,0,W,H);
    ctx.restore();

    drawText("Aile birlikte daha güçlü ❤️", W/2, H/2 - 70, 26, 0.96*a, 900, "rgba(255,255,255,.92)", "center");
  }

  function drawFinalNote() {
    if (finalNote <= 0) return;
    const a = Math.min(1, finalNote / 1.6);

    ctx.save();
    ctx.globalAlpha = 0.72 * a;
    ctx.fillStyle = "rgba(0,0,0,0.58)";
    ctx.fillRect(W/2 - 290, H/2 - 72, 580, 140);
    ctx.restore();

    drawText("Demir için yapılmış özel oyun", W/2, H/2 - 10, 22, 0.95*a, 900, "rgba(255,255,255,.92)", "center");
    drawText("Baba ❤️", W/2, H/2 + 28, 22, 0.95*a, 900, "rgba(255,255,255,.92)", "center");
    drawText("R: Yeniden Başlat", W/2, H/2 + 64, 14, 0.85*a, 700, "rgba(255,255,255,.85)", "center");
  }

  // ===== Render with scaling =====
  function beginFrame() {
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.setTransform(view.scale, 0, 0, view.scale, view.ox, view.oy);
  }

  function render(now, dt) {
    beginFrame();
    drawBaseGradient();
    drawParallax(now, dt);

    drawWordFlash();
    if (tur === 1 || tur === 2) drawArrowFlash();

    // Ground
    ctx.strokeStyle = "rgba(255,255,255,.14)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY+1);
    ctx.lineTo(W, groundY+1);
    ctx.stroke();

    drawStars();
    drawPowerups();
    drawShards(); // particles on top of background
    drawCharacter();
    drawObstacles();

    // HUD
    const hudY = 28 + (view.safeTop / view.dpr ? 8 : 0);
    drawText(`Skor: ${Math.floor(score)}`, 16, hudY, 18, 1, 800);
    drawText(`Rekor: ${best}`, 16, hudY + 24, 14, 0.86);
    drawText(`Tur: ${tur}`, 16, hudY + 46, 14, 0.78);
    drawText(`⭐: ${starCount}`, 16, hudY + 68, 14, 0.82);

    const s1 = shield ? "🛡️ Kalkan" : "🛡️ -";
    const s2 = (tur === 2 && tur2LifeAvailable) ? "❤️ Can: 1" : (tur === 2 ? "❤️ Can: 0" : "");
    drawText(s1, W - 16, hudY + 24, 14, 0.86, 800, "rgba(255,255,255,.90)", "right");
    if (s2) drawText(s2, W - 16, hudY + 46, 14, 0.82, 800, "rgba(255,255,255,.88)", "right");

    if (turBanner > 0) {
      ctx.save();
      ctx.globalAlpha = turBanner;
      ctx.fillStyle = "rgba(255,255,255,.92)";
      ctx.font = "900 46px system-ui, -apple-system, Segoe UI, Roboto, Arial";
      ctx.fillText(`Tur ${tur}`, W/2 - 70, H/2 - 20);
      ctx.restore();
    }

    drawAds(now, dt);
    drawLoveOverlay();
    drawTur3Message();
    drawToast();
    drawFamilyFinale();
    drawFinalNote();

    if (!started) drawStartScreen(now);

    if (!running && finalNote <= 0) {
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.fillStyle = "rgba(0,0,0,.35)";
      ctx.fillRect(W/2 - 220, H/2 - 90, 440, 170);
      ctx.restore();

      drawText("Oyun Bitti", W/2, H/2 - 35, 30, 1, 900, "rgba(255,255,255,.92)", "center");
      drawText(`Skor: ${Math.floor(score)}`, W/2, H/2 + 5, 18, 0.92, 800, "rgba(255,255,255,.92)", "center");
      drawText(`Rekor: ${best}`, W/2, H/2 + 30, 16, 0.88, 700, "rgba(255,255,255,.92)", "center");
      drawText("R: Yeniden Başlat", W/2, H/2 + 62, 14, 0.88, 700, "rgba(255,255,255,.90)", "center");
    }
  }

  // ===== Update =====
  function update(dt, now) {
    wordFlash = Math.max(0, wordFlash - dt * 0.9);
    arrowFlash = Math.max(0, arrowFlash - dt * 1.2);
    turBanner  = Math.max(0, turBanner  - dt * 0.6);
    if (tur3Message > 0) tur3Message = Math.max(0, tur3Message - dt * 0.35);
    if (toastTimer > 0) toastTimer = Math.max(0, toastTimer - dt);

    if (invuln > 0) invuln = Math.max(0, invuln - dt);
    if (shieldCooldown > 0) shieldCooldown = Math.max(0, shieldCooldown - dt);
    if (shieldBreakFlash > 0) shieldBreakFlash = Math.max(0, shieldBreakFlash - dt*1.8);

    updateShards(dt);

    if (familyScene > 0) {
      familyScene = Math.max(0, familyScene - dt);
      if (familyScene === 0) finalNote = 3.6;
      return;
    }
    if (finalNote > 0) {
      finalNote = Math.max(0, finalNote - dt);
      if (finalNote === 0) running = false;
      return;
    }
    if (loveSequence > 0) {
      loveSequence = Math.max(0, loveSequence - dt);
      if (loveSequence === 0 && afterLoveToTur3) {
        afterLoveToTur3 = false;
        setTur(3);
      }
      return;
    }

    if (!started || !running) return;

    const cfg = cfgForTur(tur);

    speed += cfg.speedRamp * dt;
    score += dt * 10;

    const current = Math.floor(score);
    updateBestIfNeeded();

    for (const m of demirMilestones) {
      if (current >= m.p && !demirSeen.has(m.p)) {
        demirSeen.add(m.p);
        toast = m.t;
        toastTimer = 2.6;
      }
    }

    if ((tur === 1 || tur === 2)) {
      const m100 = Math.floor(current / 100) * 100;
      if (m100 >= 100 && m100 !== lastWordTrigger && current % 100 === 0) {
        lastWordTrigger = m100;
        wordFlash = 1;
      }
    }

    if (tur === 1 || tur === 2) {
      const m250 = Math.floor(current / 250) * 250;
      if (m250 >= 250 && m250 !== lastArrowTrigger && current % 250 === 0) {
        lastArrowTrigger = m250;
        arrowFlash = 1;
      }
    }

    if (tur === 1 && current >= 500) setTur(2);
    if (tur === 2 && current >= 1000) {
      loveSequence = 3.2;
      afterLoveToTur3 = true;
      obstacles = [];
      stars = [];
      powerups = [];
      spawnTimer = 0;
      return;
    }

    spawnTimer += dt;
    if (spawnTimer >= nextSpawn * cfg.spawnFactor) {
      spawnTimer = 0;
      nextSpawn = cfg.spawnMin + Math.random() * cfg.spawnVar;
      spawnObstacle();

      const pStar = (tur === 1) ? 0.30 : (tur === 2 ? 0.24 : 0.20);
      if (Math.random() < pStar) spawnStar();

      if ((tur === 1 || tur === 2) && Math.random() < (tur === 1 ? 0.11 : 0.09)) {
        spawnShieldPowerup();
      }
    }

    for (const o of obstacles) {
      o.x -= speed * dt;
      if (o.kind === 'circle') {
        o.hopT += dt * o.hopFreq;
        const hop = Math.abs(Math.sin(o.hopT)) * o.hopAmp;
        o.y = o.baseY - hop;
      }

      if (tur === 3 && !o.passed) {
        const rightEdge = (o.kind === 'rect') ? (o.x + o.w) : (o.x + o.r);
        if (rightEdge < player.x - 2) {
          o.passed = true;
          clearedInTur3 += 1;
          if (clearedInTur3 === 3) {
            tur3Message = 1;
            familyScene = 4.2;
            obstacles = [];
            stars = [];
            powerups = [];
          }
        }
      }
    }

    for (const s of stars) {
      s.x -= speed * dt;
      s.spin += dt * 3.2;
      if (!s.got && starCollide(s)) {
        s.got = true;
        starCount += 1;
        score += 5;
      }
    }

    for (const p of powerups) {
      p.x -= speed * dt;
      p.spin += dt * 2.6;
      if (!p.got && powerupCollide(p)) {
        p.got = true;
        if (p.type === 'shield') {
          shield = true;
          toast = "Kalkan aktif! 🛡️";
          toastTimer = 1.8;
        }
      }
    }

    obstacles = obstacles.filter(o => (o.kind === 'rect') ? (o.x + o.w > -60) : (o.x + o.r > -60));
    stars = stars.filter(s => !s.got && s.x + s.r > -60);
    powerups = powerups.filter(p => !p.got && p.x + p.r > -80);

    player.vy += cfg.gravity * dt;
    player.y += player.vy * dt;

    if (player.y + player.h >= groundY) {
      player.y = groundY - player.h;
      player.vy = 0;
      player.onGround = true;
    }

    if (checkCollisionsConsume()) {
      running = false;
      updateBestIfNeeded();
    }
  }

  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    update(dt, now);
    render(now, dt);
    requestAnimationFrame(loop);
  }

  // Input
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); jump(); }
    if (e.key.toLowerCase() === 'r') reset();
    if (e.key.toLowerCase() === 'b') clearBest();
  }, { passive:false });

  canvas.addEventListener('pointerdown', (e) => { e.preventDefault(); jump(); }, { passive:false });

  function bindBtn(id, fn){
    const btn = document.getElementById(id);
    if(!btn) return;
    btn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); fn(); }, {passive:false});
    btn.addEventListener('click', (e)=>{ e.preventDefault(); fn(); });
  }
  bindBtn('btnJump', jump);
  bindBtn('btnRestart', reset);
  bindBtn('btnResetBest', clearBest);

  // PWA SW
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    });
  }

  // Init
  reset();
  requestAnimationFrame(() => { resizeCanvas(); requestAnimationFrame(loop); });
})();
</script>
</body>
</html>
